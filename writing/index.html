<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>writing — dilina bandara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Lora', 'Lyon Text', Georgia, ui-serif, serif;
    background: #f7f6f3;
    color: #37352f;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }
  .site { max-width: 620px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
  nav { display: flex; gap: 1.5rem; margin-bottom: 3rem; }
  nav a { font-size: 14px; color: #9b9a97; text-decoration: none; transition: color 0.1s; }
  nav a:hover { color: #37352f; }
  nav a.active { color: #37352f; }
  h1 { font-size: 20px; font-weight: 500; color: #37352f; margin-bottom: 2rem; }
  .year-label { font-size: 13px; color: #9b9a97; margin: 0 0 6px; }
  .essay-list { list-style: none; padding: 0; margin: 0 0 2.5rem; }
  .essay-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #e3e2df; }
  .essay-item:first-child { border-top: 1px solid #e3e2df; }
  .essay-icon { flex-shrink: 0; margin-top: 3px; opacity: 0.3; }
  .essay-item a { font-size: 14px; color: #37352f; text-decoration: none; display: block; line-height: 1.5; }
  .essay-item a:hover { color: #000; }
  .essay-meta { font-size: 12px; color: #9b9a97; margin-top: 2px; }
  .empty-state { font-size: 14px; color: #9b9a97; padding: 1rem 0; }
</style>
</head>
<body>
<div class="site">
  <nav>
    <a href="/">dilina</a>
    <a href="/writing" class="active">writing</a>
  </nav>
  <h1>writing</h1>
  <p class="empty-state">no essays yet.</p>
</div>
</body>
</html>
